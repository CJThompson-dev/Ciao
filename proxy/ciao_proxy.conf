# Nginx worker processes
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_cache_path /var/cache/nginx/hosp
                     levels=1:2
                     keys_zone=hosp_cache:10m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    log_format debug '$remote_addr - $remote_user [$time_local] '
                 '"$request" $status '
                 'upstream_status=$upstream_status '
                 'upstream_addr=$upstream_addr '
                 'cache=$upstream_cache_status '
                 'request_time=$request_time '
                 'upstream_time=$upstream_response_time';
    access_log /var/log/nginx/access.log debug;

    upstream hosp {
        server ciao-reliability-server.animal-hospital.mkrs.link:80 max_fails=0;
        server ciao-reliability-server.animal-hospital.mkrs.link:80 max_fails=0;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ---- ENTRY POINT ----
        # Splits GET (safe to retry) from writes (never retried).
        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # GETs go to the retry-enabled block. Writes fall through
            # to a normal proxy_pass with NO retry (avoids duplicate notes).
            error_page 418 = @get_with_retry;
            if ($request_method = GET) {
                return 418;
            }

            # --- writes (POST/PATCH/DELETE): straight through, no retry ---
            proxy_pass http://hosp;
            proxy_set_header Host ciao-reliability-server.animal-hospital.mkrs.link;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-From-Proxy "true";
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;
        }

        # ---- GET-ONLY: retry HOSP 500s by catching them and re-running ----
        location @get_with_retry {
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Catch a 5xx and re-issue the request internally (one more try).
            proxy_intercept_errors on;
            error_page 500 502 503 504 = @get_second_try;

            proxy_pass http://hosp;
            proxy_set_header Host ciao-reliability-server.animal-hospital.mkrs.link;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-From-Proxy "true";

            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;

            # Connection-level retries (timeouts/unreachable) still handled here
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;

            proxy_cache hosp_cache;
            proxy_cache_methods GET HEAD;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;
            proxy_cache_valid 200 302 60m;
            proxy_cache_valid 404 5s;
            proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ---- The second attempt for a GET that 500'd the first time ----
        location @get_second_try {
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_pass http://hosp;
            proxy_set_header Host ciao-reliability-server.animal-hospital.mkrs.link;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-From-Proxy "true";

            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;

            # On the retry: if it ALSO 500s, fall back to stale cache
            # rather than looping. This is the safety net.
            proxy_cache hosp_cache;
            proxy_cache_methods GET HEAD;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;
            proxy_cache_valid 200 302 60m;
            proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}