# Nginx worker processes
# Automatically uses the available CPU cores
worker_processes auto;

# Events block
# Defines how Nginx handles client connections
events {
    # Maximum simultaneous connections per worker process
    worker_connections 1024;
}

# HTTP block
# All proxy, caching and web server configuration belongs inside this block
http {

    # Cache setup:
    # This is the cache locker so this is where the cached copies will live
    proxy_cache_path /var/cache/nginx/hosp
                     levels=1:2
                     keys_zone=hosp_cache:10m
                     max_size=100m
                     inactive=10m
                     use_temp_path=off;

    # Forwarding setup:
    # Defines the backend HOSP server that requests will be forwarded to
    upstream hosp {
        server ciao-reliability-server.animal-hospital.mkrs.link:80;
    }

    # This is our own proxy server
    server {

        # Listen for incoming HTTP traffic on port 80
        listen 80;

        # Respond to requests regardless of hostname
        server_name _;

        # Health check endpoint
        # Used by the load balancer to verify the proxy is healthy
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Forward everything else to HOSP
        location / {

            # Send all client requests to the upstream HOSP server
            proxy_pass http://hosp;

            # Preserve the original request information
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HOSP has a 9 second wait, instructions to timeout:
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;

            # Caching
            # Enable caching for responses from the HOSP server
            proxy_cache hosp_cache;

            # Cache successful responses for 30 seconds
            proxy_cache_valid 200 302 30s;

            # Cache 404 responses for 5 seconds
            proxy_cache_valid 404 5s;

            # Serve the last known good cached copy if the backend has errors
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

            # Prevent multiple clients requesting the same uncached content
            proxy_cache_lock on;
        }
    }
}