# Nginx worker processes
# Automatically uses the available CPU cores
worker_processes auto;

# Events block
# Defines how Nginx handles client connections
events {
    # Maximum simultaneous connections per worker process
    worker_connections 1024;
}

# HTTP block
# All proxy, caching and web server configuration belongs inside this block
http {

    # Cache setup:
    # This is the cache locker so this is where the cached copies will live
    proxy_cache_path /var/cache/nginx/hosp
                     levels=1:2
                     keys_zone=hosp_cache:10m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    # Debug logging: shows upstream status, cache status and timings
    log_format debug '$remote_addr - $remote_user [$time_local] '
                 '"$request" $status '
                 'upstream_status=$upstream_status '
                 'upstream_addr=$upstream_addr '
                 'cache=$upstream_cache_status '
                 'request_time=$request_time '
                 'upstream_time=$upstream_response_time';

    access_log /var/log/nginx/access.log debug;

    # Forwarding setup:
    # Defines the backend HOSP server that requests will be forwarded to
    upstream hosp {
        server ciao-reliability-server.animal-hospital.mkrs.link:80 max_fails=0;
        server ciao-reliability-server.animal-hospital.mkrs.link:80 max_fails=0;

        # Keep connections open to the backend (reused between requests)
        keepalive 32;
    }

    # This is our own proxy server
    server {

        # Listen for incoming HTTP traffic on port 80
        listen 80;

        # Respond to requests regardless of hostname
        server_name _;

        # Health check endpoint
        # Used by the load balancer to verify the proxy is healthy
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Forward everything else to HOSP
        location / {

            # Required for upstream keepalive to work
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Send all client requests to the upstream HOSP server
            proxy_pass http://hosp;

            # Send the backend's hostname so HOSP routes the request correctly
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-From-Proxy "true";

            # HOSP has a 9 second wait, instructions to timeout:
            proxy_connect_timeout 2s;
            proxy_read_timeout 3s;
            proxy_send_timeout 30s;

            # Caching
            # Enable caching for responses from the HOSP server
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 15s;

            proxy_cache hosp_cache;
            proxy_cache_methods GET HEAD;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;

            # Cache successful responses for 30 seconds
            proxy_cache_valid 200 302 60m;

            # Cache 404 responses for 5 seconds
            proxy_cache_valid 404 5s;

            # Serve the last known good cached copy if the backend has errors
            proxy_cache_use_stale updating error timeout http_502 http_503 http_504;

            # Prevent multiple clients requesting the same uncached content
            # proxy_cache_lock on;
            proxy_cache_background_update on;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # Show whether the response came from cache (HIT/MISS)
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}